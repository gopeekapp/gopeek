<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoPeek Blog — Browser Productivity & Tab Management Tips</title>
 
  <meta name="description" content="Tips, guides, and insights on browser productivity, tab management, and smarter browsing. From the GoPeek team." />
  <meta name="keywords" content="browser productivity, tab management, link preview, browser extensions, gopeek blog" />

  <meta property="og:title" content="GoPeek Blog — Browser Productivity & Tab Management Tips" />
  <meta property="og:description" content="Tips, guides, and insights on browser productivity, tab management, and smarter browsing." />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="GoPeek Blog — Browser Productivity & Tab Management Tips" />
  <meta name="twitter:description" content="Tips, guides, and insights on browser productivity, tab management, and smarter browsing." />

  <link rel="icon" href="GoPeek_Logo.png" type="image/png" />
  <link rel="canonical" href="https://gopeek-lovat.vercel.app/blog.html">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html { scroll-behavior: smooth; }
    body { background: #f8fafc; overflow-x: hidden; }

    .glass {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 1);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
    }

    .gradient-text {
      background: linear-gradient(to right, #0f172a, #2563eb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .blog-card {
  background: #ffffff;
  border: 1px solid #e2e8f0;
  border-radius: 16px;
  overflow: hidden;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}

.blog-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, #3b82f6, #60a5fa);
  opacity: 0;
  transition: opacity 0.25s ease;
}

.blog-card:hover {
  border-color: #bfdbfe;
  box-shadow: 0 4px 20px rgba(59, 130, 246, 0.08), 0 1px 3px rgba(0, 0, 0, 0.04);
}

.blog-card:hover::before {
  opacity: 1;
}

.blog-card img {
  width: 100%;
  height: 192px;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
}

.blog-card:hover img {
  transform: scale(1.03);
}

/* Tags row - single line, no wrap */
.tags-row {
  display: flex;
  flex-wrap: nowrap;
  overflow: hidden;
  white-space: nowrap;
  gap: 0;
}

/* Slightly tighter card padding for better proportions */
.blog-card .p-6 {
  padding: 1.25rem;
}

/* Title sizing for better hierarchy */
.blog-card h3 {
  font-size: 1.0625rem;
  line-height: 1.4;
  letter-spacing: -0.01em;
}

/* Excerpt line height */
.blog-card p {
  line-height: 1.6;
}

    .blog-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .tag {
      display: inline-block;
      background: #eff6ff;
      color: #2563eb;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .tags-row {
  display: flex;
  flex-wrap: nowrap;
  overflow: hidden;
  white-space: nowrap;
  gap: 0;
  /* The margin-right on .tag handles spacing */
}
    .featured-card {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      color: white;
      border-radius: 24px;
      overflow: hidden;
      transition: transform 0.3s ease;
    }

    .featured-card:hover {
      transform: scale(1.01);
    }

    .featured-card h2 {
      color: white;
    }

    .featured-card p {
      color: #cbd5e1;
    }

    .search-box {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 0.75rem 1rem;
      width: 100%;
      max-width: 400px;
      font-size: 0.95rem;
      color: #475569;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-box:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .search-box::placeholder {
      color: #94a3b8;
    }

    .category-pill {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #e2e8f0;
      background: white;
      color: #475569;
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .category-pill:hover,
    .category-pill.active {
      background: #0f172a;
      color: white;
      border-color: #0f172a;
    }

    .read-time {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.8rem;
      color: #94a3b8;
    }

    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>

<body class="text-slate-900 min-h-screen font-sans">

  <!-- Background blobs -->
  <div class="absolute inset-0 -z-10 overflow-hidden">
    <div class="absolute top-[-120px] left-[-80px] w-[300px] md:w-[400px] h-[300px] md:h-[400px] bg-blue-400/20 blur-3xl rounded-full"></div>
    <div class="absolute bottom-[-120px] right-[-80px] w-[320px] md:w-[420px] h-[320px] md:h-[420px] bg-indigo-400/20 blur-3xl rounded-full"></div>
  </div>

  <!-- Header -->
  <header class="max-w-6xl mx-auto px-4 md:px-6 py-4 md:py-6 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-3">
      <img src="GoPeek_Logo.png" alt="GoPeek Logo" class="w-10 h-10 object-contain drop-shadow-md rounded-xl" />
      <span class="text-xl font-bold text-slate-800">GoPeek</span>
    </a>
    <div class="flex items-center gap-4">
      <a href="blog.html" class="text-slate-600 font-medium text-sm hover:text-slate-900 transition">Blog</a>
      <a href="index.html#install" class="glass text-slate-800 font-medium px-4 py-2 rounded-xl hover:bg-white transition text-sm">
        Get GoPeek
      </a>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 md:px-6 pt-8 md:pt-16 pb-24">

    <!-- Blog Header -->
    <section class="text-center max-w-3xl mx-auto mb-12 md:mb-16">
      <div class="inline-flex items-center gap-2 glass px-4 py-2 rounded-full text-xs md:text-sm text-blue-700 font-medium mb-6">
        <span class="relative flex h-2 w-2">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
        </span>
        GoPeek Blog
      </div>

      <h1 class="text-4xl sm:text-5xl md:text-6xl font-black leading-tight mb-6 gradient-text">
        Smarter Browsing,<br>Fewer Tabs
      </h1>

      <p class="text-base md:text-lg text-slate-600 leading-relaxed max-w-2xl mx-auto mb-8">
        Tips, guides, and insights on browser productivity, tab management, and the future of how we explore the web.
      </p>

      <!-- Search -->
      <div class="flex justify-center mb-8">
        <input type="text" class="search-box" placeholder="Search articles..." id="searchInput" onkeyup="filterPosts()" />
      </div>

      <!-- Categories -->
      <div class="flex flex-wrap justify-center">
        <button class="category-pill active" onclick="filterCategory('all')">All</button>
        <button class="category-pill" onclick="filterCategory('productivity')">Productivity</button>
        <button class="category-pill" onclick="filterCategory('browser-tips')">Browser Tips</button>
        <button class="category-pill" onclick="filterCategory('tab-management')">Tab Management</button>
        <button class="category-pill" onclick="filterCategory('extensions')">Extensions</button>
      </div>
    </section>

    <!-- Featured Post (Auto-populated) -->
    <section class="mb-12 md:mb-16" id="featured">
      <div id="featuredContainer">
        <div class="glass rounded-2xl p-10 text-center">
          <div class="inline-block animate-spin h-8 w-8 border-4 border-blue-500 border-t-transparent rounded-full mb-4"></div>
          <p class="text-slate-500">Loading featured post...</p>
        </div>
      </div>
    </section>

    <!-- All Posts Grid (Auto-populated) -->
    <section>
      <h2 class="text-2xl md:text-3xl font-bold mb-8 text-slate-900">All Articles</h2>
      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" id="postsGrid">
        <div class="col-span-full text-center py-12">
          <div class="inline-block animate-spin h-8 w-8 border-4 border-blue-500 border-t-transparent rounded-full mb-4"></div>
          <p class="text-slate-500">Loading articles...</p>
        </div>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="max-w-6xl mx-auto px-6 pb-10 pt-4 text-slate-500 text-sm flex flex-col md:flex-row items-center justify-between gap-4 border-t border-slate-200/50">
    <div>© 2026 GoPeek</div>
    <div class="flex items-center gap-5">
      <a href="privacy.html" class="hover:text-slate-900 transition">Privacy</a>
      <a href="index.html" class="hover:text-slate-900 transition">Home</a>
      <a href="blog.html" class="hover:text-slate-900 transition">Blog</a>
    </div>
  </footer>

  <script>
    /* ═══════════════════════════════════════════════
       CONFIG — EDIT THESE 3 VALUES ONLY
       ═══════════════════════════════════════════════ */
    const CONFIG = {
      owner: 'gopeekapp',   // ← Your GitHub username (e.g. 'johndoe')
      repo: 'gopeek',          // ← Your repo name (e.g. 'gopeek-lovat' or 'johndoe.github.io')
      branch: 'main'                   // ← Your default branch (usually 'main' or 'master')
    };

    const CACHE_KEY = 'gopeek_blog_cache';
    const CACHE_DURATION = 60 * 60 * 1000; // 1 hour

    async function loadBlogPosts() {
      // Try cache first so repeat visitors don't hit API limits
      const cached = localStorage.getItem(CACHE_KEY);
      if (cached) {
        try {
          const { timestamp, posts } = JSON.parse(cached);
          if (Date.now() - timestamp < CACHE_DURATION) {
            renderPosts(posts);
            return;
          }
        } catch (e) { /* bad cache — ignore */ }
      }

      try {
        // 1. Ask GitHub for every file in the repo
        const treeUrl = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/git/trees/${CONFIG.branch}?recursive=1`;
        const treeRes = await fetch(treeUrl);

        if (!treeRes.ok) {
          throw new Error(`GitHub API returned ${treeRes.status}. Make sure the repo is public and the owner/name above are correct.`);
        }

        const treeData = await treeRes.json();

        // 2. Keep only root-level blog-*.html files
        const blogFiles = treeData.tree.filter(item =>
          item.path.startsWith('blog-') &&
          item.path.endsWith('.html') &&
          !item.path.includes('/')
        );

        if (blogFiles.length === 0) {
          throw new Error('No blog-*.html files found in the repo root.');
        }

        // 3. Download and parse each post
        const posts = await Promise.all(blogFiles.map(async (file) => {
          const rawUrl = `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${file.path}`;
          const html = await fetch(rawUrl).then(r => r.text());
          return parsePost(html, file.path);
        }));

        // 4. Sort newest first
        posts.sort((a, b) => b.dateObj - a.dateObj);

        // 5. Cache locally
        localStorage.setItem(CACHE_KEY, JSON.stringify({
          timestamp: Date.now(),
          posts
        }));

        renderPosts(posts);

      } catch (err) {
        console.error('Auto-blog error:', err);
        const msg = `<div class="col-span-full text-center py-12">
          <p class="text-red-500 font-semibold mb-2">Could not load posts automatically.</p>
          <p class="text-slate-500 text-sm">${escapeHtml(err.message)}</p>
          <p class="text-slate-400 text-sm mt-2">Check the browser console (F12 → Console) for details.</p>
        </div>`;
        document.getElementById('postsGrid').innerHTML = msg;
        document.getElementById('featuredContainer').innerHTML = msg;
      }
    }

    function parsePost(html, filename) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');

      // Title
      let title = doc.querySelector('title')?.textContent?.trim() || 'Untitled';
      title = title.replace(/\s*\|\s*GoPeek\s*$/, '').replace(/\s*\|\s*GoPeek Blog\s*$/, '');

      // Meta description
      const description = doc.querySelector('meta[name="description"]')?.getAttribute('content') || '';

      // Date & read time (first span in the date bar)
      const dateDiv = doc.querySelector('.flex.items-center.gap-4.text-sm.text-slate-500, .flex.items-center.gap-4.text-sm');
      const spans = dateDiv ? Array.from(dateDiv.querySelectorAll('span')) : [];
      const date = spans[0]?.textContent?.trim() || '';

      let readTime = '';
      spans.forEach(span => {
        if (span.textContent.includes('min')) readTime = span.textContent.trim();
      });

      // Tags (ignore a "Featured" tag if present)
      const tags = Array.from(doc.querySelectorAll('.tag'))
        .map(t => t.textContent.trim())
        .filter(t => t && t.toLowerCase() !== 'featured');

      // Hero image
      let img = doc.querySelector('.glass.rounded-2xl img')?.getAttribute('src') ||
                doc.querySelector('article img')?.getAttribute('src') ||
                doc.querySelector('main img')?.getAttribute('src') ||
                'GoPeek_Logo.png';

      const slug = filename.replace('.html', '');
      const dateObj = date ? new Date(date).getTime() : 0;

      return { title, description, date, readTime, tags, img, slug, filename, dateObj };
    }

    function renderPosts(posts) {
      if (!posts.length) return;

      // FEATURED = newest post
      const featured = posts[0];
      const rest = posts.slice(1);

      document.getElementById('featuredContainer').innerHTML = `
        <a href="${featured.slug}.html" class="featured-card block">
          <div class="grid md:grid-cols-2">
            <div class="p-8 md:p-10 flex flex-col justify-center">
              <div class="mb-4">
                <span class="tag">Featured</span>
                ${featured.tags.slice(0, 2).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
              </div>
              <h2 class="text-2xl md:text-3xl font-black mb-4 leading-tight">${escapeHtml(featured.title)}</h2>
              <p class="mb-6 leading-relaxed">${escapeHtml(featured.description)}</p>
              <div class="flex items-center gap-4 text-sm">
                <span class="text-slate-400">${escapeHtml(featured.date)}</span>
                <span class="text-slate-500">·</span>
                <span class="read-time">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 6v6l4 2"></path>
                  </svg>
                  ${escapeHtml(featured.readTime || '5 min read')}
                </span>
              </div>
            </div>
            <div class="hidden md:block">
              <img src="${escapeHtml(featured.img)}" alt="${escapeHtml(featured.title)}" class="w-full h-full object-cover" style="min-height: 320px;" />
            </div>
          </div>
        </a>
      `;

      // GRID = everything else
      document.getElementById('postsGrid').innerHTML = rest.map(post => {
        const categoryData = post.tags.map(t => t.toLowerCase().replace(/\s+/g, '-')).join(' ');
        return `
          <article class="blog-card" data-category="${escapeHtml(categoryData)}">
            <a href="${post.slug}.html" class="block">
              <div class="h-48 bg-slate-100 overflow-hidden">
                <img src="${escapeHtml(post.img)}" alt="${escapeHtml(post.title)}" class="w-full h-full object-cover" loading="lazy" />
              </div>
              <div class="p-6">
                <div class="mb-3 tags-row">
                  ${post.tags.slice(0, 3).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
                </div>
                <h3 class="text-lg font-bold text-slate-900 mb-2 leading-snug">${escapeHtml(post.title)}</h3>
                <p class="text-sm text-slate-600 mb-4 line-clamp-2">${escapeHtml(post.description)}</p>
                <div class="flex items-center justify-between text-xs text-slate-400">
                  <span>${escapeHtml(post.date)}</span>
                  <span class="read-time">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                      <circle cx="12" cy="12" r="10"></circle>
                      <path d="M12 6v6l4 2"></path>
                    </svg>
                    ${escapeHtml(post.readTime || '5 min')}
                  </span>
                </div>
              </div>
            </a>
          </article>
        `;
      }).join('');
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    /* ═══════════════════════════════════════════════
       Existing filter logic (works on rendered DOM)
       ═══════════════════════════════════════════════ */
    function filterCategory(category) {
      document.querySelectorAll('.category-pill').forEach(pill => pill.classList.remove('active'));
      event.target.classList.add('active');

      document.querySelectorAll('.blog-card').forEach(post => {
        if (category === 'all') {
          post.style.display = '';
        } else {
          const categories = post.getAttribute('data-category') || '';
          post.style.display = categories.includes(category) ? '' : 'none';
        }
      });
    }

    function filterPosts() {
      const term = document.getElementById('searchInput').value.toLowerCase();
      document.querySelectorAll('.blog-card').forEach(post => {
        const title = post.querySelector('h3').textContent.toLowerCase();
        const excerpt = post.querySelector('p').textContent.toLowerCase();
        const tags = Array.from(post.querySelectorAll('.tag')).map(t => t.textContent.toLowerCase()).join(' ');
        post.style.display = (title.includes(term) || excerpt.includes(term) || tags.includes(term)) ? '' : 'none';
      });
    }

    // Kick everything off
    document.addEventListener('DOMContentLoaded', loadBlogPosts);
  </script>

</body>
</html>
