<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoPeek Promo Tile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    body {
      margin: 0;
      padding: 40px;
      background: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }

    /* Fixed CWS Screenshot Size */
    .promo-container {
      width: 1280px;
      height: 800px;
      background: #0f172a; /* Deep Slate */
      position: relative;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border-radius: 16px;
    }

    /* Glowing Background Orbs */
    .glow-1 {
      position: absolute;
      top: -150px;
      left: -100px;
      width: 600px;
      height: 600px;
      background: rgba(37, 99, 235, 0.4); /* Blue */
      filter: blur(120px);
      border-radius: 50%;
    }

    .glow-2 {
      position: absolute;
      bottom: -200px;
      right: -100px;
      width: 700px;
      height: 700px;
      background: rgba(99, 102, 241, 0.3); /* Indigo */
      filter: blur(140px);
      border-radius: 50%;
    }

    .gradient-text {
      background: linear-gradient(to right, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Glass Mockup Window */
    .mock-window {
      width: 650px;
      height: 480px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 40px 80px -10px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
      position: absolute;
      right: 60px;
      top: 160px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: perspective(1000px) rotateY(-5deg) rotateX(2deg);
      transition: transform 0.3s ease;
    }

    .mock-header {
      height: 42px;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid #e5e5ea;
    }

    .traffic-lights {
      display: flex;
      gap: 8px;
      margin-right: 12px;
    }
    .light { width: 12px; height: 12px; border-radius: 50%; }
    .close { background: #ff5f56; }
    .expand { background: #28c940; }
    .pin { background: #d1d1d6; }

    .nav-btns {
      display: flex;
      gap: 4px;
      margin-right: 12px;
      opacity: 0.5;
    }

    .mock-url {
      flex-grow: 1;
      background: #e9e9eb;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #86868b;
      font-weight: 500;
    }

    .mock-body {
      flex-grow: 1;
      background: #ffffff;
      padding: 30px;
    }

    /* Skeleton UI inside Mockup */
    .sk-title { width: 70%; height: 24px; background: #e2e8f0; border-radius: 4px; margin-bottom: 20px; }
    .sk-text { width: 100%; height: 12px; background: #f1f5f9; border-radius: 4px; margin-bottom: 12px; }
    .sk-text-short { width: 85%; height: 12px; background: #f1f5f9; border-radius: 4px; margin-bottom: 30px; }
    .sk-img { width: 100%; height: 200px; background: #f8fafc; border-radius: 8px; border: 1px solid #f1f5f9;}

    /* Feature Pills */
    .feature-pill {
      display: inline-flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      color: #e2e8f0;
      backdrop-filter: blur(10px);
    }
    .feature-pill svg { margin-right: 8px; }

    /* Floating Bubble Mock */
    .mock-bubble {
      position: absolute;
      right: 680px;
      bottom: 200px;
      width: 64px;
      height: 64px;
      background: #ffffff;
      border-radius: 50%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      display: flex;
      justify-content: center;
      align-items: center;
      border: 2px solid #f1f5f9;
      transform: perspective(1000px) rotateY(-5deg);
      overflow: hidden;
    }
    
    .mock-bubble img {
      width: 65%;
      height: 65%;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <!-- 1280x800 Promotional Container -->
  <div class="promo-container">
    
    <!-- Background Glows -->
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <!-- Left Content (Copy) -->
    <div class="absolute left-[80px] top-[180px] w-[500px] z-10">
      
      <!-- Brand -->
      <div class="flex items-center gap-4 mb-8">
        <img src="GoPeek_Logo.png" alt="GoPeek Logo" class="w-12 h-12 rounded-xl shadow-lg shadow-blue-500/20 object-contain bg-white">
        <span class="text-2xl font-bold text-white tracking-tight">GoPeek</span>
      </div>

      <!-- Headline -->
      <h1 class="text-[56px] leading-[1.1] font-black text-white mb-6">
        Preview links <br>
        <span class="gradient-text">instantly.</span>
      </h1>

      <!-- Subheadline -->
      <p class="text-xl text-slate-300 leading-relaxed mb-10 font-medium">
        Hold Shift and hover over any link to open a fully interactive mini-browser. Never lose your place again.
      </p>

      <!-- Feature Pills -->
      <div class="flex flex-wrap gap-4">
        <div class="feature-pill">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="3" x2="12" y2="21"></line></svg>
          Split-Screen Snap
        </div>
        <div class="feature-pill">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a10 10 0 0 1 0 20z"></path></svg>
          Minimize to Bubble
        </div>
        <div class="feature-pill">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          Ghost Mode
        </div>
      </div>

    </div>

    <!-- Right Content (Mockup Visuals) -->
    
    <!-- Mini Browser Window -->
    <div class="mock-window">
      <div class="mock-header">
        
        <div class="traffic-lights">
          <div class="light close"></div>
          <div class="light expand"></div>
          <div class="light pin"></div>
        </div>

        <!-- Realistically Positioned Nav Buttons -->
        <div class="nav-btns">
          <svg width="16" height="16" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
          <svg width="16" height="16" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>

        <div class="mock-url">
          <svg class="w-3 h-3 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          en.wikipedia.org
        </div>

      </div>
      <div class="mock-body">
        <div class="sk-title"></div>
        <div class="sk-text"></div>
        <div class="sk-text"></div>
        <div class="sk-text-short"></div>
        <div class="sk-img"></div>
      </div>
    </div>

    <!-- Minimized Bubble with Logo -->
    <div class="mock-bubble">
      <img src="GoPeek_Logo.png" alt="GoPeek Logo">
    </div>

    <!-- Fake 'Shift' Key hint -->
    <div class="absolute bottom-[80px] left-[80px] flex items-center gap-3 opacity-60">
      <div class="px-3 py-1.5 border-2 border-slate-500 rounded-md text-slate-300 font-bold text-sm">SHIFT</div>
      <span class="text-slate-400 font-medium text-sm">+ Hover over link</span>
    </div>

  </div>

</body>
</html>
